[project]
name = "robinhood-trader"
version = "0.1.0"
description = "RSI mean-reversion trading bot for Robinhood Agentic"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.27.0",
    "pandas>=2.2.0",
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.9",
    "pyyaml>=6.0.0",
    "streamlit>=1.35.0",
    "plotly>=5.22.0",
    "pytz>=2024.1",
    "aiohttp>=3.9.5",
]

[dependency-groups]
dev = [
    "invoke>=2.2.0",
    "keyring>=25.0.0",
    "diagrams>=0.23.0",
    "playwright>=1.60.0",
]

[tool.hatch.build.targets.wheel]
packages = ["broker", "strategy", "risk", "db", "tax", "vault"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

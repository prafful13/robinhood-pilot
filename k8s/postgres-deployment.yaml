apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: robinhood-trader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: robinhood_trader
            - name: POSTGRES_USER
              value: trader
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "trader", "-d", "robinhood_trader"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "trader", "-d", "robinhood_trader"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6        # 60s of failure before restart

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data

      restartPolicy: Always

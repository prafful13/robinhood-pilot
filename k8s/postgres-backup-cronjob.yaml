apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: robinhood-trader
spec:
  schedule: "0 5 * * *"    # 5 AM UTC daily (midnight ET in summer)
  concurrencyPolicy: Forbid  # skip if previous backup is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: postgres:16-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: password
              command:
                - sh
                - -c
                - |
                  set -e
                  FILE="/backups/robinhood_trader_$(date +%Y%m%d_%H%M%S).sql.gz"
                  pg_dump -h postgres -U trader robinhood_trader | gzip > "$FILE"
                  SIZE=$(du -h "$FILE" | cut -f1)
                  echo "Backup complete: $FILE ($SIZE)"
                  # Keep only the 7 most recent backups
                  ls -t /backups/*.sql.gz 2>/dev/null | tail -n +8 | xargs -r rm -v
                  echo "Backups retained: $(ls /backups/*.sql.gz | wc -l)"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup
          restartPolicy: OnFailure
